spring.application.name=Booking-Sytem

server.port = 8081

spring.datasource.url=jdbc:mysql://localhost:3306/BookingSystemDB
spring.datasource.username=root
spring.datasource.password=Ashish@123
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

spring.security.user.name=ashish
spring.security.user.password=1234

spring.data.redis.host=localhost
spring.data.redis.port=6379

# Cache Type
spring.cache.type=redis

# kafka properties

# Kafka Broker
spring.kafka.bootstrap-servers=localhost:9092

# -------------------- Producer --------------------
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer

# -------------------- Consumer --------------------
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.value.default.type=com.Ashish.Booking.Sytem.event.BookingCreatedEvent
# Package containing classes that can be deserialized
spring.kafka.consumer.properties.spring.json.trusted.packages=com.ashish.Booking.Sytem


# Start reading from the beginning if no offset exists
spring.kafka.consumer.auto-offset-reset=earliest
